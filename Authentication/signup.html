<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sign Up — Metups</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="./styles.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4DD9C0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Metups">
  <link rel="apple-touch-icon" href="/icons/Metups_logo-192.png">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="nav-logo" style="font-size:1.1rem">
        <div class="logo-lockup" style="align-items: center; gap:12px">
          <div class="logo-icon" style="width: 50px; height: 50px;" ></div> <!-- CSS sets the image -->
        </div>
      </div>
      <h1>Metups</h1>
      <p>Join the community — buy &amp; sell pre-owned goods</p>
    </div>

    <!-- Form -->
    <form id="signupForm">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-with-icon">
          <i class="fas fa-user"></i>
          <input type="text" id="fullName" class="input-field" placeholder="John Doe" required autocomplete="name">
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-with-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" class="input-field" placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-with-icon">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" class="input-field" placeholder="Min 8 characters" required autocomplete="new-password" minlength="8">
          <button type="button" id="togglePwd" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);background:none;border:none;cursor:pointer">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <!-- Location detection -->
      <div class="form-group">
        <label>Your Location</label>

        <!-- One-tap auto-detect -->
        <button type="button" id="detectBtn"
                style="display:flex;align-items:center;gap:8px;width:100%;
                       padding:11px 14px;border:2px dashed var(--teal-dark);
                       border-radius:var(--radius-sm);background:var(--teal-light);
                       color:var(--blue);font-family:var(--font-head);
                       font-weight:700;font-size:.88rem;cursor:pointer;
                       margin-bottom:8px;transition:all .2s">
          <i class="fas fa-location-arrow" id="detectIcon"></i>
          <span id="detectLabel">Detect my location automatically</span>
        </button>

        <!-- Detected display (shown after success) -->
        <div id="detectedLocation" style="display:none;
             padding:8px 12px;background:var(--green-light);
             border-radius:var(--radius-sm);border:1px solid var(--green);
             font-size:.82rem;color:var(--green-dark);margin-bottom:8px">
          <i class="fas fa-check-circle"></i>
          <span id="detectedText"></span>
          <button type="button" onclick="clearDetected()"
                  style="float:right;background:none;border:none;
                         color:var(--text-muted);cursor:pointer;font-size:.75rem">
            ✕ Change
          </button>
        </div>

        <!-- Manual fallback: city + country -->
        <div id="manualLocation">
          <div class="input-with-icon" style="margin-bottom:6px">
            <i class="fas fa-city"></i>
            <input type="text" id="city" class="input-field"
                   placeholder="City (e.g. Harare)"
                   autocomplete="address-level2">
          </div>
          <div class="input-with-icon">
            <i class="fas fa-globe-africa"></i>
            <input type="text" id="country" class="input-field"
                   placeholder="Country (e.g. Zimbabwe)"
                   autocomplete="country-name">
          </div>
        </div>

        <!-- Hidden fields carry the final values to the submit handler -->
        <input type="hidden" id="locationDisplay">
        <input type="hidden" id="locationLat">
        <input type="hidden" id="locationLng">
        <input type="hidden" id="locationCountryCode">
      </div>

      <div id="authMessage"></div>

      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="auth-footer-link" style="margin-top:14px">
      Already have an account? <a href="./login.html">Log in</a>
    </div>

    <p style="text-align:center;font-size:.72rem;color:var(--text-light);margin-top:10px">
      By signing up you agree to our
      <a href="#" style="color:var(--blue)">Terms</a> &amp;
      <a href="#" style="color:var(--blue)">Privacy Policy</a>
    </p>
  </div>
</div>

<script type="module">
  import { supabaseClient } from './supabase.js';
  import { handleError, isValidEmail, isValidPassword } from './utils.js';
  import { getUserCoordinates, reverseGeocode } from './location.js';

  // ── Password visibility toggle ─────────────────────────────────
  document.getElementById('togglePwd').addEventListener('click', () => {
    const inp  = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    inp.type       = inp.type === 'password' ? 'text'     : 'password';
    icon.className = inp.type === 'text'     ? 'fas fa-eye-slash' : 'fas fa-eye';
  });

  // ── Location detection ─────────────────────────────────────────
  let detectedLocation = null; // { city, country, countryCode, displayName, lat, lng }

  document.getElementById('detectBtn').addEventListener('click', async () => {
    const btn   = document.getElementById('detectBtn');
    const icon  = document.getElementById('detectIcon');
    const label = document.getElementById('detectLabel');

    btn.disabled = true;
    icon.className = 'fas fa-spinner fa-spin';
    label.textContent = 'Detecting…';

    try {
      const coords   = await getUserCoordinates();
      const location = await reverseGeocode(coords.lat, coords.lng);
      detectedLocation = location;

      // Show confirmed banner
      document.getElementById('detectedText').textContent = `📍 ${location.displayName}`;
      document.getElementById('detectedLocation').style.display = 'block';

      // Pre-fill manual fields too (user can still edit)
      document.getElementById('city').value    = location.city;
      document.getElementById('country').value = location.country;

      // Store in hidden fields
      document.getElementById('locationDisplay').value     = location.displayName;
      document.getElementById('locationLat').value         = location.lat;
      document.getElementById('locationLng').value         = location.lng;
      document.getElementById('locationCountryCode').value = location.countryCode;

      icon.className = 'fas fa-check-circle';
      label.textContent = 'Location detected!';
    } catch (err) {
      icon.className = 'fas fa-location-arrow';
      label.textContent = 'Detect my location automatically';
      btn.disabled = false;
      showMsg(document.getElementById('authMessage'), err.message, 'info');
    }
  });

  // Allow user to clear detection and type manually
  window.clearDetected = () => {
    detectedLocation = null;
    document.getElementById('detectedLocation').style.display = 'none';
    document.getElementById('detectBtn').disabled = false;
    document.getElementById('detectIcon').className = 'fas fa-location-arrow';
    document.getElementById('detectLabel').textContent = 'Detect my location automatically';
    document.getElementById('locationDisplay').value = '';
    document.getElementById('locationLat').value     = '';
    document.getElementById('locationLng').value     = '';
  };

  // ── Form submit ────────────────────────────────────────────────
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const fullName = document.getElementById('fullName').value.trim();
    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const msgDiv   = document.getElementById('authMessage');
    const btn      = document.getElementById('submitBtn');

    // Build location data: prefer auto-detected, fall back to manual
    const city    = document.getElementById('city').value.trim();
    const country = document.getElementById('country').value.trim();
    const displayName = detectedLocation?.displayName
      || [city, country].filter(Boolean).join(', ');
    const lat  = detectedLocation?.lat  ?? null;
    const lng  = detectedLocation?.lng  ?? null;
    const code = detectedLocation?.countryCode ?? '';

    // Validation
    if (!fullName)              { showMsg(msgDiv, 'Please enter your full name.', 'error'); return; }
    if (!isValidEmail(email))   { showMsg(msgDiv, 'Enter a valid email address.', 'error'); return; }
    if (!isValidPassword(password)) { showMsg(msgDiv, 'Password must be at least 8 characters.', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account…';

    // Create auth user
    // NOTE: When email confirmation is ON, Supabase sends a verification
    // email via its built-in service. The free tier allows only 2 emails/hour.
    // If you hit that limit, configure a custom SMTP provider in:
    //   Supabase Dashboard → Authentication → Email → SMTP Settings
    //   (use Resend or any SMTP provider — it's free)
    let data, error;
    try {
      ({ data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: { data: { full_name: fullName } }
      }));
    } catch (fetchErr) {
      // AuthRetryableFetchError with email confirmation ON means Supabase
      // could not send the confirmation email. Most common cause: the free
      // tier email rate limit (2 emails/hour) has been hit. Fix: configure
      // a custom SMTP provider in Supabase → Auth → Email settings.
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
      showMsg(msgDiv,
        '⚠️ Signup failed while trying to send your confirmation email. ' +
        'This is usually Supabases free email limit (2 emails/hour). ' +
        'Please wait an hour and try again, or ask the site admin to configure ' +
        'a custom email provider in Supabase → Authentication → Email Settings.',
        'error');
      return;
    }

    if (error) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';

      let msg;
      if (error.message?.includes('already registered') || error.message?.includes('User already registered')) {
        msg = 'An account with this email already exists. <a href="./login.html" style="color:var(--blue);font-weight:700">Log in instead?</a>';
      } else if (error.message?.includes('rate limit') || error.message?.includes('Rate limit')) {
        msg = '⚠️ Email rate limit hit. Supabase free tier allows 2 confirmation emails/hour. Wait and try again, or configure a custom SMTP provider.';
      } else if (error.message?.includes('Invalid email')) {
        msg = 'That email address is not valid.';
      } else if (error.message?.includes('Password should be')) {
        msg = 'Password is too weak. Use at least 8 characters.';
      } else if (error.message?.includes('smtp') || error.message?.includes('SMTP') || error.message?.includes('email')) {
        msg = '⚠️ Could not send confirmation email. Configure a custom SMTP provider in Supabase → Authentication → Email Settings.';
      } else {
        msg = handleError(error, 'Signup');
      }
      showMsg(msgDiv, msg, 'error');
      return;
    }

    // data.user exists but data.session is null → email confirmation required
    // data.session exists → auto-confirmed (confirmation off)
    const needsConfirmation = data?.user && !data?.session;

    // Upsert profile row with full location data
    if (data?.user) {
      await supabaseClient.from('profiles').upsert({
        id:           data.user.id,
        email,
        full_name:    fullName,
        location:     displayName  || null,
        city:         city         || null,
        country:      country      || null,
        country_code: code         || null,
        lat:          lat,
        lng:          lng,
      }, { onConflict: 'id' });
    }

    localStorage.setItem('signupEmail', email);

    if (needsConfirmation) {
      // Email confirmation required — redirect to confirm page
      showMsg(msgDiv, '✅ Account created! Check your email for the confirmation link.', 'success');
      btn.innerHTML = '✅ Check Your Email';
      setTimeout(() => {
        window.location.href = `./confirm.html?email=${encodeURIComponent(email)}`;
      }, 1500);
    } else {
      // Auto-confirmed (email confirmation off) — go straight to browse
      showMsg(msgDiv, '✅ Account created! Welcome to Metups.', 'success');
      btn.innerHTML = '✅ Account Created';
      setTimeout(() => {
        window.location.href = '../index.html';
      }, 1200);
    }
  });

  function showMsg(el, msg, type) {
    el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    if (type === 'success') setTimeout(() => { el.innerHTML = ''; }, 5000);
  }
</script>

<!-- PWA Service Worker -->
<script>
  if ('serviceWorker' in navigator)
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(()=>{}));
</script>

</body>
</html>
