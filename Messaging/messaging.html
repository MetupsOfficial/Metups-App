<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Messages — Metups</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../Authentication/styles.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4DD9C0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Metups">
  <link rel="apple-touch-icon" href="/icons/Metups_logo-192.png">
</head>
<body>
<div class="app-shell" id="appShell">

  <!-- ══════════════════════════════════════════
       VIEW A: Conversation LIST
       ══════════════════════════════════════════ -->
  <div id="viewList">
    <nav class="top-nav">
      <button class="nav-icon-btn" onclick="history.back()">
        <i class="fas fa-arrow-left" style="color:var(--blue)"></i>
      </button>
      <div class="nav-logo" style="font-size:1.1rem">
        <div class="logo-lockup" style="align-items: center; gap:12px">
          <div class="logo-icon"></div> <!-- CSS sets the image -->
          <div class="logo-text">
            <span>Messages</span>
          </div>
        </div>
      </div>
      <div class="nav-icons">
        <button class="nav-icon-btn" title="Search conversations">
          <i class="fas fa-search" style="color:var(--blue)"></i>
        </button>
      </div>
    </nav>

    <div style="height:var(--nav-height)"></div>

  <div id="convList"></div>

  <script>
    const convList = document.getElementById("convList");

    const skeletonConv = `
      <div style="display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--border)">
        <div class="skeleton" style="width:48px;height:48px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="skeleton" style="height:13px;width:60%;margin-bottom:6px"></div>
          <div class="skeleton" style="height:11px;width:80%"></div>
        </div>
        <div class="skeleton" style="height:10px;width:30px"></div>
      </div>
    `;

    convList.innerHTML = Array(4).fill().map(() => skeletonConv).join("");
  </script>

    <div id="convEmpty" class="empty-state" style="display:none">
      <i class="fas fa-comment-slash"></i>
      <h3>No conversations yet</h3>
      <p>Start a conversation by messaging a seller on any product listing.</p>
      <a href="../index.html" class="btn btn-primary" style="margin-top:16px">Browse Listings</a>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       VIEW B: Chat Window
       ══════════════════════════════════════════ -->
  <div id="viewChat" style="display:none">

    <!-- Chat header -->
    <div class="chat-header">
      <button class="back-btn" onclick="closeChat()">
        <i class="fas fa-arrow-left"></i>
      </button>
      <div class="convo-avatar" id="chatAvatar" style="width:36px;height:36px;font-size:.8rem"></div>
      <div class="chat-header-info" style="padding-left:6px">
        <div class="chat-header-name" id="chatName"></div>
        <div style="font-size:.7rem;color:var(--text-muted)" id="chatStatus">Tap for info</div>
      </div>
      <div class="nav-icons">
        <button class="nav-icon-btn" title="More options" id="chatMenuBtn">
          <i class="fas fa-ellipsis-v" style="color:var(--blue)"></i>
        </button>
      </div>
    </div>

    <!-- Product strip (pinned context) -->
    <div class="chat-product-strip" id="chatProductStrip">
      <div class="chat-product-thumb" id="chatProductThumb">
        <div style="width:100%;height:100%;background:var(--teal-light);display:flex;align-items:center;justify-content:center">
          <i class="fas fa-box" style="color:var(--teal-dark)"></i>
        </div>
      </div>
      <div>
        <div class="chat-product-title" id="chatProductTitle"></div>
        <div class="chat-product-price" id="chatProductPrice"></div>
      </div>
      <a href="#" id="chatProductLink" style="margin-left:auto;font-size:.72rem;color:var(--blue);font-weight:700">View ›</a>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages" style="margin-top:calc(var(--nav-height) + 64px)">
      <!-- Injected messages -->
    </div>

    <!-- Mark as sold banner (for sellers) -->
    <div id="markSoldBanner" style="display:none;background:var(--green);color:#fff;text-align:center;padding:8px;font-weight:700;font-size:.82rem;cursor:pointer" onclick="confirmMarkSold()">
      ✅ Deal made? Mark this item as SOLD
    </div>

    <!-- Input bar -->
    <div class="chat-input-bar">
      <div class="chat-input-wrap">
        <button class="chat-input-icon" id="attachBtn" title="Attach image">
          <i class="fas fa-image"></i>
        </button>
        <input type="file" id="imgAttachInput" accept="image/*" hidden>
        <textarea class="chat-input" id="msgInput" placeholder="Message…" rows="1"></textarea>
        <button class="chat-input-icon" id="emojiBtn">😊</button>
      </div>
      <!-- Show send OR voice depending on input -->
      <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()" style="display:none">
        <i class="fas fa-paper-plane"></i>
      </button>
      <button class="chat-voice-btn" id="voiceBtn" onclick="toggleVoice()">
        <i class="fas fa-microphone"></i>
      </button>
    </div>

  </div>

</div><!-- /.app-shell -->

<script type="module">
  import { supabaseClient } from '../Authentication/supabase.js';
  import { checkAuth, formatCurrency, getAvatarInitials, formatDate } from '../Authentication/utils.js';

  // ── Storage bucket name (change here if you rename the bucket) ──
  const IMAGES_BUCKET = 'product_images';

  // ──────────────────────────────────────
  // STATE
  // ──────────────────────────────────────
  let currentUser        = null;
  let activeConvId       = null;
  let activeConv         = null;
  let realtimeSub        = null;
  let mediaRecorder      = null;
  let isRecording        = false;
  let audioChunks        = [];
  // Prevents initInputListener() re-attaching on every openChat() call,
  // which caused sendMessage() to fire multiple times per keypress.
  let inputListenerBound = false;

  // ──────────────────────────────────────
  // BOOT
  // ──────────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {
    currentUser = await checkAuth();
    if (!currentUser) { window.location.href = '../Authentication/login.html'; return; }

    await loadConversations();

    // Open specific conversation from URL query param
    const params = new URLSearchParams(window.location.search);
    const convId = params.get('conversation');
    if (convId) openChat(convId);
  });

  // ──────────────────────────────────────
  // LOAD CONVERSATIONS LIST
  // ──────────────────────────────────────
  async function loadConversations() {
    const { data: convs, error } = await supabaseClient
      .from('conversations')
      .select(`
        *,
        product:products(id, title, price),
        buyer:profiles!buyer_id(id, full_name, avatar_url),
        seller:profiles!seller_id(id, full_name, avatar_url)
      `)
      .or(`buyer_id.eq.${currentUser.id},seller_id.eq.${currentUser.id}`)
      .order('last_message_at', { ascending: false });

    if (error || !convs || convs.length === 0) {
      document.getElementById('convList').innerHTML = '';
      document.getElementById('convEmpty').style.display = 'block';
      return;
    }

    // Load last message for each
    const withLastMsg = await Promise.all(convs.map(async (c) => {
      const { data: msg } = await supabaseClient
        .from('messages')
        .select('content, sent_at, sender_id, message_type')
        .eq('conversation_id', c.id)
        .order('sent_at', { ascending: false })
        .limit(1)
        .maybeSingle();
      return { ...c, lastMsg: msg };
    }));

    renderConvList(withLastMsg);
  }

  function renderConvList(convs) {
    const list = document.getElementById('convList');
    list.innerHTML = convs.map(c => {
      // The other person in the conversation
      const other = currentUser.id === c.buyer_id ? c.seller : c.buyer;
      const initials = getAvatarInitials(other?.full_name || 'UN');
      const lastText = c.lastMsg
        ? (c.lastMsg.message_type === 'image' ? '📷 Image' : c.lastMsg.content)
        : 'No messages yet';
      const time = c.lastMsg
        ? new Date(c.lastMsg.sent_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
        : '';

      return `
        <div class="convo-item" onclick="openChat('${c.id}')">
          <div class="convo-avatar">
            ${other?.avatar_url
              ? `<img src="${other.avatar_url}" alt="${initials}">`
              : initials
            }
          </div>
          <div class="convo-info">
            <div class="convo-name">${escHtml(other?.full_name || 'Unknown')}</div>
            <div class="convo-product">${escHtml(c.product?.title || '')}</div>
            <div class="convo-last">${escHtml(lastText)}</div>
          </div>
          <div class="convo-meta">
            <div class="convo-time">${time}</div>
            ${c.unread_count > 0 ? `<div class="unread-dot"></div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // ──────────────────────────────────────
  // OPEN CHAT
  // ──────────────────────────────────────
  window.openChat = async (convId) => {
    activeConvId = convId;

    // Fetch full conversation details
    const { data: conv } = await supabaseClient
      .from('conversations')
      .select(`
        *,
        product:products(id, title, price, seller_id),
        buyer:profiles!buyer_id(id, full_name, avatar_url),
        seller:profiles!seller_id(id, full_name, avatar_url)
      `)
      .eq('id', convId)
      .single();

    if (!conv) return;
    activeConv = conv;

    // Switch views
    document.getElementById('viewList').style.display = 'none';
    document.getElementById('viewChat').style.display = 'block';

    // Populate header
    const other = currentUser.id === conv.buyer_id ? conv.seller : conv.buyer;
    const initials = getAvatarInitials(other?.full_name || 'UN');
    const avatarEl = document.getElementById('chatAvatar');
    if (other?.avatar_url) avatarEl.innerHTML = `<img src="${other.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    else avatarEl.textContent = initials;
    document.getElementById('chatName').textContent = other?.full_name || 'Unknown';

    // Product strip
    if (conv.product) {
      document.getElementById('chatProductTitle').textContent = conv.product.title;
      document.getElementById('chatProductPrice').textContent = formatCurrency(conv.product.price);
      document.getElementById('chatProductLink').href = `../Dashboard/product.html?id=${conv.product.id}`;
    }

    // Load first image for product strip
    const { data: pImg } = await supabaseClient
      .from('product_images')
      .select('image_url')
      .eq('product_id', conv.product?.id)
      .limit(1)
      .maybeSingle();
    if (pImg?.image_url) {
      // image_url is a storage path — reconstruct full URL via getPublicUrl
      const { data: imgData } = supabaseClient.storage.from(IMAGES_BUCKET).getPublicUrl(pImg.image_url);
      document.getElementById('chatProductThumb').innerHTML = `<img src="${imgData.publicUrl}" style="width:100%;height:100%;object-fit:cover">`;
    }

    // Mark as sold banner (shown only to seller)
    if (currentUser.id === conv.seller_id && !conv.product?.sold) {
      document.getElementById('markSoldBanner').style.display = 'block';
    }

    // Load messages
    await loadMessages(convId);

    // Mark conversation as read
    await supabaseClient.from('conversations').update({ unread_count: 0 }).eq('id', convId);
    await supabaseClient.from('messages').update({ read_at: new Date().toISOString() })
      .eq('conversation_id', convId).neq('sender_id', currentUser.id).is('read_at', null);

    // Subscribe to real-time messages
    subscribeToMessages(convId);

    // Input listener
    initInputListener();

    // Scroll to bottom
    scrollToBottom();
  };

  window.closeChat = () => {
    // Unsubscribe
    if (realtimeSub) { supabaseClient.removeChannel(realtimeSub); realtimeSub = null; }
    activeConvId = null;
    activeConv   = null;

    document.getElementById('viewChat').style.display = 'none';
    document.getElementById('viewList').style.display = 'block';

    // Reload conversation list to update unread counts
    loadConversations();
  };

  // ──────────────────────────────────────
  // MESSAGES
  // ──────────────────────────────────────
  async function loadMessages(convId) {
    const { data: msgs } = await supabaseClient
      .from('messages')
      .select('*')
      .eq('conversation_id', convId)
      .order('sent_at', { ascending: true });

    renderMessages(msgs || []);
  }

  function renderMessages(msgs) {
    const container = document.getElementById('chatMessages');
    if (msgs.length === 0) {
      container.innerHTML = `<div class="chat-date-label">Start the conversation!</div>`;
      return;
    }

    let lastDate = null;
    container.innerHTML = msgs.map(m => {
      const isSent = m.sender_id === currentUser.id;
      const date   = new Date(m.sent_at);
      const dayStr = date.toDateString();
      const timeStr = date.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

      let dateSep = '';
      if (dayStr !== lastDate) {
        lastDate = dayStr;
        const today = new Date().toDateString();
        const label = dayStr === today ? 'Today' : date.toLocaleDateString([], { day:'numeric', month:'short' });
        dateSep = `<div class="chat-date-label">${label}</div>`;
      }

      const tick = m.read_at
        ? '<i class="fas fa-check-double" style="color:var(--teal-dark)"></i>'
        : m.delivered_at
          ? '<i class="fas fa-check-double" style="color:var(--text-light)"></i>'
          : '<i class="fas fa-check" style="color:var(--text-light)"></i>';

      let bubbleContent = '';
      if (m.message_type === 'image' && m.media_url) {
        bubbleContent = `<img src="${m.media_url}" style="max-width:220px;border-radius:8px;display:block" alt="Image">`;
        if (m.content) bubbleContent += `<p style="margin-top:4px;font-size:.85rem">${escHtml(m.content)}</p>`;
      } else if (m.message_type === 'voice' && m.media_url) {
        bubbleContent = `<audio controls src="${m.media_url}" style="max-width:220px;width:100%"></audio>`;
      } else {
        bubbleContent = `<span>${escHtml(m.content)}</span>`;
      }

      return `
        ${dateSep}
        <div class="message-row ${isSent ? 'sent' : 'received'}" id="msg-${m.id}">
          ${!isSent ? `<div class="msg-avatar">${getAvatarInitials(activeConv?.buyer?.full_name || 'B')}</div>` : ''}
          <div class="bubble ${isSent ? 'sent' : 'received'}">
            ${bubbleContent}
            <div class="bubble-time">
              ${timeStr}
              ${isSent ? tick : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');

    scrollToBottom();
  }

  function appendMessage(msg) {
    const container  = document.getElementById('chatMessages');
    const isSent     = msg.sender_id === currentUser.id;
    const date       = new Date(msg.sent_at);
    const timeStr    = date.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

    const div = document.createElement('div');
    div.className = `message-row ${isSent ? 'sent' : 'received'}`;
    div.id = `msg-${msg.id}`;
    div.innerHTML = `
      ${!isSent ? `<div class="msg-avatar">${getAvatarInitials(activeConv?.buyer?.full_name || 'B')}</div>` : ''}
      <div class="bubble ${isSent ? 'sent' : 'received'}">
        <span>${escHtml(msg.content)}</span>
        <div class="bubble-time">${timeStr}</div>
      </div>
    `;
    container.appendChild(div);
    scrollToBottom();
  }

  // ──────────────────────────────────────
  // SEND MESSAGE
  // ──────────────────────────────────────
  window.sendMessage = async () => {
    const input   = document.getElementById('msgInput');
    const content = input.value.trim();
    if (!content || !activeConvId) return;

    input.value = '';
    toggleSendVoiceBtn('');

    const { data: msg, error } = await supabaseClient
      .from('messages')
      .insert({
        conversation_id: activeConvId,
        sender_id: currentUser.id,
        content,
        message_type: 'text'
      })
      .select()
      .single();

    // Surface any database / RLS error to the user
    if (error) {
      console.error('[sendMessage] insert failed:', error);
      // Re-populate the input so the user doesn't lose their message
      input.value = content;
      toggleSendVoiceBtn(content);
      alert('Could not send message: ' + (error.message || 'Unknown error'));
      return;
    }

    if (msg) {
      appendMessage(msg);
      // Increment unread_count for the other participant (not overwrite)
      await supabaseClient.rpc('increment_unread', { conv_id: activeConvId })
        .then(({ error: rpcErr }) => {
          if (rpcErr) {
            // Fallback: plain update if the RPC hasn't been created yet
            supabaseClient.from('conversations')
              .update({ last_message_at: new Date().toISOString() })
              .eq('id', activeConvId);
          }
        });
    }
  };

  // ──────────────────────────────────────
  // IMAGE ATTACHMENT
  // ──────────────────────────────────────
  document.getElementById('attachBtn').addEventListener('click', () => {
    document.getElementById('imgAttachInput').click();
  });

  document.getElementById('imgAttachInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const btn = document.getElementById('attachBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

    const filePath = `conversations/${activeConvId}/${Date.now()}_${file.name}`;
    const { error: uploadErr } = await supabaseClient.storage
      .from('messages')
      .upload(filePath, file, { cacheControl: '3600', upsert: false });

    btn.innerHTML = '<i class="fas fa-image"></i>';

    if (uploadErr) { alert('Upload failed: ' + uploadErr.message); return; }

    const { data: urlData } = supabaseClient.storage.from('messages').getPublicUrl(filePath);

    await supabaseClient.from('messages').insert({
      conversation_id: activeConvId,
      sender_id: currentUser.id,
      content: '',
      message_type: 'image',
      media_url: urlData.publicUrl
    });

    await loadMessages(activeConvId); // refresh
    e.target.value = '';
  });

  // ──────────────────────────────────────
  // VOICE RECORDING
  // ──────────────────────────────────────
  window.toggleVoice = async () => {
    if (isRecording) {
      mediaRecorder.stop();
    } else {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const path = `conversations/${activeConvId}/voice_${Date.now()}.webm`;

          const { error } = await supabaseClient.storage.from('messages').upload(path, blob);
          if (!error) {
            const { data: urlData } = supabaseClient.storage.from('messages').getPublicUrl(path);
            await supabaseClient.from('messages').insert({
              conversation_id: activeConvId, sender_id: currentUser.id,
              content: '🎤 Voice message', message_type: 'voice', media_url: urlData.publicUrl
            });
            await loadMessages(activeConvId);
          }
          stream.getTracks().forEach(t => t.stop());
          isRecording = false;
          const btn = document.getElementById('voiceBtn');
          btn.classList.remove('recording');
          btn.innerHTML = '<i class="fas fa-microphone"></i>';
        };

        mediaRecorder.start();
        isRecording = true;
        const btn = document.getElementById('voiceBtn');
        btn.classList.add('recording');
        btn.innerHTML = '<i class="fas fa-stop"></i>';
      } catch {
        alert('Microphone access denied. Check your browser permissions.');
      }
    }
  };

  // ──────────────────────────────────────
  // REAL-TIME SUBSCRIPTION
  // ──────────────────────────────────────
  function subscribeToMessages(convId) {
    if (realtimeSub) supabaseClient.removeChannel(realtimeSub);

    realtimeSub = supabaseClient
      .channel(`chat-${convId}`)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'messages',
        filter: `conversation_id=eq.${convId}`
      }, (payload) => {
        // Only append if it's from the OTHER person (our own was already appended)
        if (payload.new.sender_id !== currentUser.id) {
          appendMessage(payload.new);
          // Mark as delivered
          supabaseClient.from('messages')
            .update({ delivered_at: new Date().toISOString() })
            .eq('id', payload.new.id);
        }
      })
      .subscribe();
  }

  // ──────────────────────────────────────
  // INPUT LISTENER — show send vs voice button
  // ──────────────────────────────────────
  function initInputListener() {
    // Only bind once — openChat() can be called multiple times in a session
    if (inputListenerBound) return;
    inputListenerBound = true;

    const input = document.getElementById('msgInput');
    input.addEventListener('input', () => toggleSendVoiceBtn(input.value.trim()));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  }

  function toggleSendVoiceBtn(val) {
    document.getElementById('sendBtn').style.display  = val ? 'flex' : 'none';
    document.getElementById('voiceBtn').style.display = val ? 'none' : 'flex';
  }

  // ──────────────────────────────────────
  // MARK AS SOLD
  // ──────────────────────────────────────
  window.confirmMarkSold = async () => {
    if (!activeConv?.product) return;
    if (!confirm(`Mark "${activeConv.product.title}" as SOLD?`)) return;

    const { error } = await supabaseClient
      .from('products')
      .update({ sold: true, sold_at: new Date().toISOString(), sold_to_id: activeConv.buyer_id })
      .eq('id', activeConv.product.id);

    if (error) { alert('Error: ' + error.message); return; }

    // Send system message in chat
    await supabaseClient.from('messages').insert({
      conversation_id: activeConvId,
      sender_id: currentUser.id,
      content: `✅ Item sold! "${activeConv.product.title}" has been marked as SOLD.`,
      message_type: 'system'
    });

    document.getElementById('markSoldBanner').style.display = 'none';
    await loadMessages(activeConvId);
    alert('✅ Item marked as sold!');
  };

  // ──────────────────────────────────────
  // HELPERS
  // ──────────────────────────────────────
  function scrollToBottom() {
    const el = document.getElementById('chatMessages');
    if (el) setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50);
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

<!-- Desktop sidebar -->
<script type="module" src="../Authentication/navigation.js"></script>

<!-- PWA Service Worker -->
<script>
  if ('serviceWorker' in navigator)
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(()=>{}));
</script>

</body>
</html>
