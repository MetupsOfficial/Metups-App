<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>My Listings — Metups</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../Authentication/styles.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#4DD9C0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Metups">
  <link rel="apple-touch-icon" href="/icons/Metups_logo-192.png">
</head>
<body>
<div class="app-shell">

  <!-- Top Nav -->
  <nav class="top-nav">
    <button class="nav-icon-btn" onclick="history.back()">
      <i class="fas fa-arrow-left" style="color:var(--blue)"></i>
    </button>
    <a href="../index.html" class="nav-logo" style="font-size:1.1rem">
      <div class="nav-logo" style="font-size:1.1rem">
        <div class="logo-lockup" style="align-items: center; gap:12px">
          <div class="logo-icon"></div> <!-- CSS sets the image -->
        </div>
      </div>
      Metups
    </a>
    <div class="nav-icons">
      <a href="../Messaging/messaging.html" class="nav-icon-btn" title="Messages">
        <i class="fas fa-comment-dots" style="color:var(--blue)"></i>
      </a>
      <a href="./menu.html" class="nav-icon-btn" title="Menu">
        <i class="fas fa-bars" style="color:var(--blue)"></i>
      </a>
    </div>
  </nav>

  <div style="height:var(--nav-height)"></div>


  <!-- Title bar -->
  <div class="page-title-bar">
    <h1>My Listings</h1>
    <div style="margin-left:auto">
      <input type="search" id="listingSearch" placeholder="Search…"
             style="border:1.5px solid var(--border);border-radius:var(--radius-pill);padding:6px 12px;font-size:.82rem;outline:none;width:140px">
    </div>
  </div>

  <!-- Stats bar -->
  <div style="display:flex;gap:1px;background:var(--border);margin-bottom:10px" id="statsBar">
    <!-- injected -->
  </div>

 <!-- Listing list -->
<div id="myListings"></div>

<script>
document.getElementById("myListings").innerHTML = [1,2,3].map(() => `
  <div class="listing-item" style="margin:0 10px 10px">
    <div class="skeleton listing-thumb"></div>
    <div class="listing-info">
      <div class="skeleton" style="height:14px;width:70%;margin-bottom:6px"></div>
      <div class="skeleton" style="height:11px;width:50%;margin-bottom:4px"></div>
      <div class="skeleton" style="height:11px;width:30%"></div>
    </div>
  </div>
`).join('');
</script>

  <!-- Empty state -->
  <div id="emptyState" class="empty-state" style="display:none">
    <i class="fas fa-store-alt-slash"></i>
    <h3>No listings yet</h3>
    <p>List your first item and start selling!</p>
    <a href="./add_product.html" class="btn btn-primary" style="margin-top:16px">
      <i class="fas fa-plus"></i> Add Listing
    </a>
  </div>

  <!-- FAB -->
  <a href="./add_product.html" class="fab" title="Add Listing">
    <i class="fas fa-plus"></i>
  </a>

</div>

<script type="module">
  import { supabaseClient } from '../Authentication/supabase.js';
  const IMAGES_BUCKET = 'product_images'; // change here if you rename the bucket
  import { checkAuth, formatCurrency, getCategoryIcon, formatDate } from '../Authentication/utils.js';

  let currentUser = null;
  let allListings = [];

  document.addEventListener('DOMContentLoaded', async () => {
    currentUser = await checkAuth();
    if (!currentUser) { window.location.href = '../Authentication/login.html'; return; }
    await loadListings();
    initSearch();
  });

  /** Fetch all products for this seller */
  async function loadListings() {
    const { data, error } = await supabaseClient
      .from('products')
      .select(`
        *,
        product_images( image_url, image_order )
      `)
      .eq('seller_id', currentUser.id)
      .eq('is_active', true)
      .order('created_at', { ascending: false });

    if (error || !data) { renderEmpty(); return; }

    allListings = data;
    renderStats(data);
    renderListings(data);
  }

  /** Render summary stats */
  function renderStats(items) {
    const total  = items.length;
    const sold   = items.filter(p => p.sold).length;
    const active = total - sold;
    const revenue = items.filter(p => p.sold).reduce((s,p) => s + (parseFloat(p.sold_price || p.price) || 0), 0);

    document.getElementById('statsBar').innerHTML = [
      { label: 'Active',  value: active,                    color: 'var(--green)' },
      { label: 'Sold',    value: sold,                      color: 'var(--blue)'  },
      { label: 'Revenue', value: formatCurrency(revenue),   color: 'var(--orange)'},
    ].map(s => `
      <div style="flex:1;background:var(--white);padding:10px 8px;text-align:center">
        <div style="font-family:var(--font-head);font-weight:900;font-size:1.1rem;color:${s.color}">${s.value}</div>
        <div style="font-size:.7rem;color:var(--text-muted);margin-top:2px">${s.label}</div>
      </div>
    `).join('');
  }

  /** Render listing items */
  function renderListings(items) {
    const container = document.getElementById('myListings');
    if (items.length === 0) { renderEmpty(); return; }

    document.getElementById('emptyState').style.display = 'none';

    container.innerHTML = items.map(p => {
      const imgs = (p.product_images || []).sort((a,b)=>(a.image_order||0)-(b.image_order||0));
      // image_url is a storage path — reconstruct the full public URL
      const _raw = imgs[0]?.image_url ?? null;
      const img  = _raw
        ? supabaseClient.storage.from(IMAGES_BUCKET).getPublicUrl(_raw).data.publicUrl
        : null;
      const icon = getCategoryIcon(p.category);

      return `
        <div class="listing-item" onclick="window.location.href='./product.html?id=${p.id}'">
          <!-- Thumbnail -->
          <div class="listing-thumb">
            ${img
              ? `<img src="${img}" alt="${escHtml(p.title)}" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-${icon} listing-icon\\'></i>'">`
              : `<i class="fas fa-${icon} listing-icon"></i>`
            }
          </div>

          <!-- Info -->
          <div class="listing-info">
            <div class="listing-title">${escHtml(p.title)}</div>
            <div class="listing-meta">${escHtml(p.location || '')} &nbsp;·&nbsp; ${escHtml(p.condition || '')}</div>
            <div class="listing-price">${formatCurrency(p.price)}</div>
            <div class="listing-actions" onclick="event.stopPropagation()">
              ${p.sold
                ? '<span class="badge-sold">SOLD</span>'
                : `<button class="badge-edit" onclick="markSold('${p.id}')">Mark Sold</button>`
              }
              <button class="btn btn-sm btn-outline" style="padding:3px 10px;font-size:.7rem"
                      onclick="editListing('${p.id}')">
                <i class="fas fa-edit"></i> Edit
              </button>
              <button class="btn btn-sm btn-danger" style="padding:3px 10px;font-size:.7rem"
                      onclick="deleteListing('${p.id}')">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>

          <!-- Views badge -->
          <div style="text-align:right;flex-shrink:0;font-size:.7rem;color:var(--text-muted)">
            <i class="fas fa-eye" style="color:var(--teal-dark)"></i>
            <div>${p.views_count || 0}</div>
            <div style="margin-top:4px;font-size:.65rem">${p.sold ? 'Sold' : 'Active'}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderEmpty() {
    document.getElementById('myListings').innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
  }

  /** Search filter */
  function initSearch() {
    document.getElementById('listingSearch').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = allListings.filter(p =>
        p.title.toLowerCase().includes(q) ||
        (p.location || '').toLowerCase().includes(q)
      );
      renderListings(filtered);
    });
  }

  // ── Actions ──
  window.markSold = async (id) => {
    if (!confirm('Mark this item as sold?')) return;
    const { error } = await supabaseClient
      .from('products')
      .update({ sold: true, sold_at: new Date().toISOString() })
      .eq('id', id);
    if (error) { alert('Error: ' + error.message); return; }
    await loadListings(); // refresh
  };

  window.editListing = (id) => {
    window.location.href = `./add_product.html?edit=${id}`;
  };

  window.deleteListing = async (id) => {
    if (!confirm('Delete this listing? This cannot be undone.')) return;
    const { error } = await supabaseClient
      .from('products')
      .update({ is_active: false })
      .eq('id', id)
      .eq('seller_id', currentUser.id);
    if (error) { alert('Error: ' + error.message); return; }
    await loadListings();
  };

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

<!-- Desktop sidebar -->
<script type="module" src="../Authentication/navigation.js"></script>

<!-- PWA Service Worker -->
<script>
  if ('serviceWorker' in navigator)
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(()=>{}));
</script>

</body>
</html>
