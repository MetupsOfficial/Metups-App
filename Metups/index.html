<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Metups — Buy &amp; Sell Pre-owned Goods</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="./Authentication/styles.css">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4DD9C0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Metups">
  <link rel="apple-touch-icon" href="./icons/Metups_logo-192.png">
</head>
<body>
<div class="app-shell">

  <!-- ── TOP NAV ── -->
  <nav class="top-nav">
    <!-- Metups Logo -->
    <a href="../index.html" class="nav-logo">
      <div class="logo-lockup" style="gap: 12px">
        <div class="logo-icon"></div> <!-- CSS sets the image -->
        <div class="logo-text" style="font-weight: 800;">
          <span>Metups</span>
        </div>
      </div>
    </a>

    <!-- Right-side icons (auth-aware) -->
    <div class="nav-icons" id="navIcons">
      <!-- Injected by renderNav() -->
    </div>
  </nav>

  <!-- ── SEARCH + LOCATION ── -->
  <div class="search-bar-wrap">
    <!-- Hamburger filter -->
    <button class="nav-icon-btn" id="filterBtn" title="Filters">
      <i class="fas fa-sliders-h"></i>
    </button>
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search Metups…" autocomplete="off">
    </div>
    <button class="search-btn" id="searchBtn" title="Search">
      <i class="fas fa-search"></i>
    </button>
  </div>

  <div class="location-row">
    <button class="location-pill" id="locationPill">
      <i class="fas fa-map-marker-alt"></i>
      <span id="locationLabel">Near you</span>
      <i class="fas fa-chevron-down" style="font-size:.65rem"></i>
    </button>
  </div>

  <!-- ── FILTER DRAWER (hidden by default) ── -->
  <div id="filterDrawer" class="filter-drawer" style="display:none">
    <div style="padding:12px 14px; display:flex; gap:8px; flex-wrap:wrap; background:var(--white); border-bottom:1px solid var(--border)">
      <select id="filterCategory" class="input-field" style="flex:1;min-width:130px;font-size:.82rem;padding:8px 10px">
        <option value="">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Fashion">Fashion</option>
        <option value="Furniture">Furniture</option>
        <option value="Appliances">Appliances</option>
        <option value="Vehicles">Vehicles</option>
        <option value="Books">Books</option>
        <option value="Other">Other</option>
      </select>
      <select id="filterCondition" class="input-field" style="flex:1;min-width:120px;font-size:.82rem;padding:8px 10px">
        <option value="">Any Condition</option>
        <option value="New">New</option>
        <option value="Like-New">Like-New</option>
        <option value="Fair">Fair</option>
        <option value="Needs Repair">Needs Repair</option>
      </select>
      <div style="display:flex;gap:8px;width:100%">
        <input type="number" id="filterMinPrice" placeholder="Min $" class="input-field" style="flex:1;font-size:.82rem;padding:8px 10px">
        <input type="number" id="filterMaxPrice" placeholder="Max $" class="input-field" style="flex:1;font-size:.82rem;padding:8px 10px">
        <button class="btn btn-primary btn-sm" onclick="applyFilters()">Filter</button>
      </div>
    </div>
  </div>

  <!-- ── PRODUCT GRID ── -->
  <main class="page" style="padding-top:0">
    <div id="productGrid" class="product-grid"></div>

    <!-- "No results" message -->
    <p class="state-msg" id="noProductsMsg" style="display:none">
      No listings found. Try adjusting your filters.
    </p>

    <!--
      Infinite-scroll sentinel.
      The IntersectionObserver watches this element.
      When it enters the viewport, the next page is fetched.
      It shows a spinner while loading and an end-of-list
      message once all products have been loaded.
    -->
    <div id="scrollSentinel" style="
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0 32px;
      color: var(--text-muted);
      font-size: .82rem;
      min-height: 60px;
    ">
      <!-- content injected by JS -->
    </div>
  </main>

  <!-- ── FLOATING ADD BUTTON (only logged-in users) ── -->
  <a href="./Dashboard/add_product.html" class="fab" id="fabBtn" title="Add Listing" style="display:none">
    <i class="fas fa-plus"></i>
  </a>

  <!-- ── GUEST SIGNUP MODAL ── -->
  <div class="modal-overlay" id="guestModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-logo">
        <div class="logo-lockup" style="align-items: center; gap:12px">
          <div class="logo-icon"></div> <!-- CSS sets the image -->
        </div>
        <h2>Join Metups</h2>
        <p>Sign up to message sellers and save items</p>
      </div>
      <a href="./Authentication/signup.html" class="btn btn-blue btn-block" style="margin-bottom:10px">
        <i class="fas fa-user-plus"></i> Sign Up Free
      </a>
      <a href="./Authentication/login.html" class="btn btn-outline btn-block">
        <i class="fas fa-sign-in-alt"></i> Already have an account? Log in
      </a>
      <button class="btn btn-sm" style="width:100%;margin-top:8px;color:var(--text-muted)" onclick="closeGuestModal()">
        Continue browsing
      </button>
    </div>
  </div>

</div><!-- /.app-shell -->

<!-- Show skeleton cards immediately while JS loads -->
<script>
  (function () {
    const grid = document.getElementById('productGrid');
    const card = `
      <div class="product-card">
        <div class="product-card-img skeleton" style="aspect-ratio:1;border-radius:0"></div>
        <div class="product-card-body">
          <div class="skeleton" style="height:14px;width:60%;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:80%;margin-bottom:4px"></div>
          <div class="skeleton" style="height:10px;width:50%"></div>
        </div>
      </div>`;
    grid.innerHTML = Array(6).fill(card).join('');
  })();
</script>

<script type="module">
  import { supabaseClient } from './Authentication/supabase.js';
  import { checkAuth, formatCurrency, getCategoryIcon } from './Authentication/utils.js';
  import { loadUserLocationFromProfile, sortProductsByProximity, detectAndSaveLocation, getStoredLocation } from './Authentication/location.js';

  // ────────────────────────────────────────────────────────────
  // CONSTANTS
  // ────────────────────────────────────────────────────────────

  /** Storage bucket name — change here if you rename the bucket. */
  const IMAGES_BUCKET = 'product_images';

  /** How many products to fetch per page. */
  const PAGE_SIZE = 20;

  // ────────────────────────────────────────────────────────────
  // STATE
  // ────────────────────────────────────────────────────────────
  let currentUser   = null;
  let savedIds      = new Set();   // product IDs the user has saved
  let activeFilters = {};
  let userLocation  = null;       // { city, country, ... } from location.js

  let currentPage   = 0;           // which page we're on (0-based)
  let isLoading     = false;       // prevents concurrent fetches
  let hasMore       = true;        // false once we run out of products

  // ────────────────────────────────────────────────────────────
  // IMAGE LAZY-LOADING — single shared IntersectionObserver
  //
  // Cards use:  <img data-src="REAL_URL" src="PLACEHOLDER" class="lazy-img">
  // When an image enters the viewport the observer swaps data-src → src.
  // One observer instance is reused across all page loads.
  // ────────────────────────────────────────────────────────────
  const imgObserver = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const img = entry.target;
      // Swap placeholder with the real URL
      img.src = img.dataset.src;
      // Remove class and stop watching this element
      img.classList.remove('lazy-img');
      obs.unobserve(img);
    });
  }, {
    rootMargin: '100px 0px',  // start loading 100px before the image scrolls in
    threshold:  0.01
  });

  /**
   * observeLazyImages()
   * Registers all currently-unloaded lazy images with the observer.
   * Call this after every batch of cards is appended to the grid.
   */
  function observeLazyImages() {
    document.querySelectorAll('img.lazy-img').forEach(img => imgObserver.observe(img));
  }

  // ────────────────────────────────────────────────────────────
  // INFINITE SCROLL — sentinel IntersectionObserver
  //
  // The sentinel <div id="scrollSentinel"> lives below the grid.
  // When it enters the viewport, we fetch the next page.
  // ────────────────────────────────────────────────────────────
  const scrollObserver = new IntersectionObserver((entries) => {
    const entry = entries[0];
    // Only trigger when the sentinel is visible and we're not already loading
    if (entry.isIntersecting && !isLoading && hasMore) {
      loadNextPage();
    }
  }, {
    rootMargin: '200px 0px',  // start fetching 200px before the bottom is reached
    threshold:  0
  });

  // Start watching the sentinel immediately
  scrollObserver.observe(document.getElementById('scrollSentinel'));

  // ────────────────────────────────────────────────────────────
  // BOOT
  // ────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {
    currentUser = await checkAuth();
    renderNav();

    // ── Parallel boot: run all non-dependent fetches at the same time ──
    // loadSavedIds() and resetAndLoad() no longer block each other.
    // Location is loaded from sessionStorage instantly if cached.

    // 1. Location — read cache first (synchronous), fall back to profile query
    userLocation = getStoredLocation();

    // 2. Kick off location profile fetch + savedIds + first product page all at once
    const bootTasks = [resetAndLoad()];  // always fetch products first

    if (currentUser) {
      document.getElementById('fabBtn').style.display = 'flex';
      // savedIds runs in parallel with the product page fetch
      bootTasks.push(
        loadSavedIds()
          .then(() => {
            // Once savedIds are loaded, re-render hearts on any cards
            // already painted (first page may have finished by now)
            document.querySelectorAll('.card-heart').forEach(btn => {
              const id = btn.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
              if (id && savedIds.has(id)) btn.classList.add('saved');
            });
          })
      );
      // Location profile fetch (only if not cached) — doesn't block anything
      if (!userLocation) {
        bootTasks.push(
          loadUserLocationFromProfile(currentUser.id).then(loc => {
            if (loc) {
              userLocation = loc;
              if (loc.city) document.getElementById('locationLabel').textContent = loc.city;
            }
          })
        );
      }
    }

    if (userLocation && userLocation.city) {
      document.getElementById('locationLabel').textContent = userLocation.city;
    }

    await Promise.allSettled(bootTasks);
    initSearch();
    initFilters();
  });

  // ────────────────────────────────────────────────────────────
  // NAV
  // ────────────────────────────────────────────────────────────
  function renderNav() {
    const icons = document.getElementById('navIcons');

    if (currentUser) {
      const initials = (currentUser.user_metadata?.full_name || currentUser.email || 'U')
        .split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

      icons.innerHTML = `
        <a href="./Dashboard/dashboard.html" class="nav-icon-btn" title="My Listings">
          <i class="fas fa-store"></i>
        </a>
        <a href="./Messaging/messaging.html" class="nav-icon-btn" title="Messages">
          <i class="fas fa-comment-dots"></i>
          <span class="nav-badge" id="msgBadge" style="display:none">0</span>
        </a>
        <a href="./Dashboard/notifications.html" class="nav-icon-btn" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="nav-badge" id="notifBadge" style="display:none">0</span>
        </a>
        <a href="./Dashboard/menu.html" class="nav-icon-btn" title="Menu">
          <div class="nav-avatar">${initials}</div>
        </a>
      `;
      // Deferred — badges update after render, never block it
      setTimeout(loadUnreadCounts, 0);
    } else {
      icons.innerHTML = `
        <a href="./Authentication/login.html"  class="btn btn-sm btn-outline" style="font-size:.78rem;padding:6px 12px">Log in</a>
        <a href="./Authentication/signup.html" class="btn btn-sm btn-blue"    style="font-size:.78rem;padding:6px 14px">Sign up</a>
      `;
    }
  }

  /** Fetch unread messages + notifications counts */
  async function loadUnreadCounts() {
    if (!currentUser) return;

    const { count: msgCount } = await supabaseClient
      .from('conversations')
      .select('*', { count: 'exact', head: true })
      .or(`buyer_id.eq.${currentUser.id},seller_id.eq.${currentUser.id}`)
      .gt('unread_count', 0);

    if (msgCount) {
      const el = document.getElementById('msgBadge');
      if (el) { el.textContent = msgCount > 9 ? '9+' : msgCount; el.style.display = 'flex'; }
    }

    const { count: notifCount } = await supabaseClient
      .from('notifications')
      .select('*', { count: 'exact', head: true })
      .eq('user_id', currentUser.id)
      .is('read_at', null);

    if (notifCount) {
      const el = document.getElementById('notifBadge');
      if (el) { el.textContent = notifCount > 9 ? '9+' : notifCount; el.style.display = 'flex'; }
    }
  }

  // ────────────────────────────────────────────────────────────
  // SAVED IDs
  // ────────────────────────────────────────────────────────────
  async function loadSavedIds() {
    const { data } = await supabaseClient
      .from('wishlists')
      .select('product_id')
      .eq('user_id', currentUser.id)
      .not('product_id', 'is', null);

    if (data) savedIds = new Set(data.map(r => r.product_id));
  }

  // ────────────────────────────────────────────────────────────
  // PAGINATION CORE
  // ────────────────────────────────────────────────────────────

  /**
   * resetAndLoad()
   * Called on first boot or whenever filters/search change.
   * Clears the grid and fetches page 0.
   */
  async function resetAndLoad() {
    currentPage = 0;
    hasMore     = true;

    // Clear grid and show skeleton placeholders
    const grid = document.getElementById('productGrid');
    const card = `
      <div class="product-card">
        <div class="product-card-img skeleton" style="aspect-ratio:1;border-radius:0"></div>
        <div class="product-card-body">
          <div class="skeleton" style="height:14px;width:60%;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:80%;margin-bottom:4px"></div>
          <div class="skeleton" style="height:10px;width:50%"></div>
        </div>
      </div>`;
    grid.innerHTML = Array(6).fill(card).join('');

    document.getElementById('noProductsMsg').style.display = 'none';
    setSentinel('loading');

    await loadNextPage();
  }

  /**
   * loadNextPage()
   * Fetches the next PAGE_SIZE products and appends them to the grid.
   * Uses Supabase .range() for cursor-based pagination.
   */
  async function loadNextPage() {
    if (isLoading || !hasMore) return;
    isLoading = true;
    setSentinel('loading');

    const from = currentPage * PAGE_SIZE;
    const to   = from + PAGE_SIZE - 1;

    // Build query with active filters
    // Query the product_with_cover VIEW instead of the products table.
    // The view uses a LATERAL subquery (LIMIT 1) to return only the cover
    // image — previously the join fetched ALL images per product and discarded
    // all but the first. With 20 products × avg 3 photos that was ~60 image
    // rows per page; now it's exactly 20.
    //
    // cover_image_path = storage path for the cover image (image_order = 0)
    let query = supabaseClient
      .from('product_with_cover')
      .select('id, title, price, condition, location, category, sold, seller_id, cover_image_path')
      .eq('is_active', true)
      .order('created_at', { ascending: false })
      .range(from, to);

    if (activeFilters.search)    query = query.textSearch('search_vector', activeFilters.search.trim());
    if (activeFilters.category)  query = query.eq('category', activeFilters.category);
    if (activeFilters.condition) query = query.eq('condition', activeFilters.condition);
    if (activeFilters.minPrice)  query = query.gte('price', parseFloat(activeFilters.minPrice));
    if (activeFilters.maxPrice)  query = query.lte('price', parseFloat(activeFilters.maxPrice));
    if (activeFilters.location)  query = query.ilike('location', `%${activeFilters.location}%`);

    let { data: products, error } = await query;

    isLoading = false;

    const grid  = document.getElementById('productGrid');
    const noMsg = document.getElementById('noProductsMsg');

    if (error) {
      // On first page error, show the no-results message
      if (currentPage === 0) {
        grid.innerHTML = '';
        noMsg.style.display = 'block';
      }
      setSentinel('idle');
      return;
    }

    // First page — clear the skeleton cards
    if (currentPage === 0) {
      grid.innerHTML = '';
    }

    if (!products || products.length === 0) {
      if (currentPage === 0) {
        noMsg.style.display = 'block';
      }
      hasMore = false;
      setSentinel('end');
      return;
    }

    // Fewer results than a full page → this is the last page
    if (products.length < PAGE_SIZE) {
      hasMore = false;
    }

    // Sort: same city first, then same country, then everywhere else
    if (userLocation && userLocation.city) {
      products = sortProductsByProximity(products, userLocation.city, userLocation.country);
    }

    // Append new cards to the grid
    const fragment = document.createDocumentFragment();
    products.forEach(p => {
      const div = document.createElement('div');
      div.innerHTML = renderCard(p);
      // appendChild moves the child nodes, not the wrapper
      while (div.firstChild) fragment.appendChild(div.firstChild);
    });
    grid.appendChild(fragment);

    // Register any new lazy-load images with the observer
    observeLazyImages();

    currentPage++;
    setSentinel(hasMore ? 'idle' : 'end');
  }

  // ────────────────────────────────────────────────────────────
  // SENTINEL STATES
  // ────────────────────────────────────────────────────────────

  /**
   * setSentinel(state)
   * Updates the scroll sentinel's content.
   *
   * 'loading' — shows a spinner (page is being fetched)
   * 'idle'    — invisible (more pages available, just waiting)
   * 'end'     — "You've seen everything" message
   */
  function setSentinel(state) {
    const el = document.getElementById('scrollSentinel');
    if (state === 'loading') {
      el.innerHTML = `<i class="fas fa-spinner fa-spin" style="font-size:1.4rem;color:var(--teal)"></i>`;
    } else if (state === 'end') {
      el.innerHTML = `
        <div style="text-align:center;padding:10px 0">
          <i class="fas fa-check-circle" style="color:var(--teal-dark);margin-bottom:6px;font-size:1.2rem"></i>
          <p style="color:var(--text-muted);font-size:.78rem">You've seen all listings</p>
        </div>`;
    } else {
      el.innerHTML = ''; // idle — nothing visible
    }
  }

  // ────────────────────────────────────────────────────────────
  // RENDER CARD
  // ────────────────────────────────────────────────────────────

  /**
   * renderCard(p)
   * Returns the HTML string for a single product card.
   *
   * Images use the lazy-load pattern:
   *   src      = 1×1 transparent GIF placeholder (renders instantly, no network)
   *   data-src = real public URL (swapped in by imgObserver when card scrolls in)
   *   class    = "lazy-img" (removed by observer once loaded)
   *
   * image_url stores the storage path (e.g. users/uid/pid/file.jpg).
   * getPublicUrl() reconstructs the full https:// URL.
   * To rename the bucket, only change IMAGES_BUCKET above.
   */
  function renderCard(p) {
    // cover_image_path comes from the product_with_cover view (single row, no array)
    let imgUrl = null;
    if (p.cover_image_path) {
      const { data } = supabaseClient.storage
        .from(IMAGES_BUCKET)
        .getPublicUrl(p.cover_image_path);
      imgUrl = data.publicUrl;
    }

    const icon    = getCategoryIcon(p.category);
    const isSaved = savedIds.has(p.id);
    const isOwn   = currentUser && currentUser.id === p.seller_id;

    // 1×1 transparent GIF — no visible flash, no extra network request
    const PLACEHOLDER = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';

    return `
      <div class="product-card" onclick="goToProduct('${p.id}')">
        <div class="product-card-img">
          ${imgUrl
            ? `<img
                 class="lazy-img"
                 src="${PLACEHOLDER}"
                 data-src="${imgUrl}"
                 alt="${escHtml(p.title)}"
                 onerror="this.parentElement.innerHTML='<i class=\\'fas fa-${icon} img-placeholder\\'></i>'">`
            : `<i class="fas fa-${icon} img-placeholder"></i>`
          }
        </div>
        ${p.sold ? '<div class="sold-overlay">SOLD</div>' : ''}
        ${!isOwn ? `
          <button class="card-heart ${isSaved ? 'saved' : ''}"
                  onclick="toggleSave(event,'${p.id}')">
            <i class="${isSaved ? 'fas' : 'far'} fa-heart"></i>
          </button>` : ''}
        <div class="product-card-body">
          <div class="card-price">${formatCurrency(p.price)}</div>
          <div class="card-title">${escHtml(p.title)}</div>
          <div class="card-meta">${escHtml(p.location || '')} · ${escHtml(p.condition || '')}</div>
        </div>
      </div>
    `;
  }

  // ────────────────────────────────────────────────────────────
  // NAVIGATE
  // ────────────────────────────────────────────────────────────
  window.goToProduct = (id) => {
    window.location.href = `./Dashboard/product.html?id=${id}`;
  };

  // ────────────────────────────────────────────────────────────
  // SAVE / UNSAVE
  // ────────────────────────────────────────────────────────────
  window.toggleSave = async (e, productId) => {
    e.stopPropagation();

    if (!currentUser) {
      showGuestModal();
      return;
    }

    const btn     = e.currentTarget;
    const icon    = btn.querySelector('i');
    const isSaved = savedIds.has(productId);

    if (isSaved) {
      await supabaseClient.from('wishlists')
        .delete()
        .eq('user_id', currentUser.id)
        .eq('product_id', productId);
      savedIds.delete(productId);
      btn.classList.remove('saved');
      icon.className = 'far fa-heart';
    } else {
      await supabaseClient.from('wishlists')
        .insert({ user_id: currentUser.id, product_id: productId, active: true });
      savedIds.add(productId);
      btn.classList.add('saved');
      icon.className = 'fas fa-heart';
    }
  };

  // ────────────────────────────────────────────────────────────
  // SEARCH
  // ────────────────────────────────────────────────────────────
  function initSearch() {
    const input = document.getElementById('searchInput');
    const btn   = document.getElementById('searchBtn');

    const run = () => {
      activeFilters.search = input.value.trim() || undefined;
      resetAndLoad();  // reset pagination, start from page 0
    };

    btn.addEventListener('click', run);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
  }

  // ────────────────────────────────────────────────────────────
  // FILTERS
  // ────────────────────────────────────────────────────────────
  function initFilters() {
    document.getElementById('filterBtn').addEventListener('click', () => {
      const d = document.getElementById('filterDrawer');
      d.style.display = d.style.display === 'none' ? 'block' : 'none';
    });
  }

  window.applyFilters = () => {
    activeFilters = {
      search:    document.getElementById('searchInput').value.trim() || undefined,
      category:  document.getElementById('filterCategory').value    || undefined,
      condition: document.getElementById('filterCondition').value   || undefined,
      minPrice:  document.getElementById('filterMinPrice').value    || undefined,
      maxPrice:  document.getElementById('filterMaxPrice').value    || undefined,
    };
    document.getElementById('filterDrawer').style.display = 'none';
    resetAndLoad();  // reset pagination, start from page 0
  };

  // ────────────────────────────────────────────────────────────
  // GUEST MODAL
  // ────────────────────────────────────────────────────────────
  function showGuestModal() {
    document.getElementById('guestModal').classList.add('open');
  }
  window.closeGuestModal = () => {
    document.getElementById('guestModal').classList.remove('open');
  };
  document.getElementById('guestModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeGuestModal();
  });

  // ────────────────────────────────────────────────────────────
  // LOCATION PILL
  // ────────────────────────────────────────────────────────────
  document.getElementById('locationPill').addEventListener('click', async () => {
    const label  = document.getElementById('locationLabel');
    const useGps = confirm('Detect your location automatically?\n\nOK = GPS  |  Cancel = Type manually');
    if (useGps) {
      try {
        label.textContent = 'Detecting…';
        userLocation = await detectAndSaveLocation(currentUser ? currentUser.id : null);
        label.textContent = userLocation.city;
        activeFilters.location = userLocation.city;
        resetAndLoad();
      } catch (err) {
        label.textContent = (userLocation && userLocation.city) ? userLocation.city : 'Near you';
        alert(err.message);
      }
    } else {
      const loc = prompt('Enter your city (e.g. Harare, Bulawayo):');
      if (loc && loc.trim()) {
        label.textContent = loc.trim();
        activeFilters.location = loc.trim();
        resetAndLoad();
      }
    }
  });

  // ────────────────────────────────────────────────────────────
  // HELPERS
  // ────────────────────────────────────────────────────────────
  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

.location-row    { position: sticky; top: calc(var(--nav-height) + 54px); z-index: 89; }
#productGrid     { margin-top: 0; padding-top: 10px; }
.filter-drawer   { position: sticky; top: calc(var(--nav-height) + 100px); z-index: 88; }

img.lazy-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: var(--teal-light);
  /* No opacity:0 — the placeholder GIF is visible while waiting */
}
</style>

    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(()=>{}));
