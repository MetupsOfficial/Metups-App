<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Log In — Metups</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="nav-logo" style="font-size:1.1rem">
        <div class="logo-lockup" style="align-items: center; gap:12px">
          <div class="logo-icon"></div> <!-- CSS sets the image -->
        </div>
      </div>
      <h1>Metups</h1>
      <p>Welcome back! Sign in to continue.</p>
    </div>

    <!-- Form -->
    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-with-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" class="input-field" placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-with-icon">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" class="input-field" placeholder="Your password" required autocomplete="current-password" minlength="8">
          <!-- Toggle visibility -->
          <button type="button" id="togglePwd" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);background:none;border:none;cursor:pointer">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <!-- Auth message area -->
      <div id="authMessage"></div>

      <button type="submit" class="btn btn-blue btn-block" id="submitBtn">
        <i class="fas fa-sign-in-alt"></i> Log In
      </button>
    </form>

    <div class="auth-divider">or continue with</div>

    <!-- Social login -->
    <div style="display:flex;gap:8px">
      <button onclick="signInWithProvider('google')" class="btn btn-outline" style="flex:1;justify-content:center;gap:6px">
        <i class="fab fa-google" style="color:#DB4437"></i> Google
      </button>
      <button onclick="signInWithProvider('facebook')" class="btn btn-outline" style="flex:1;justify-content:center;gap:6px">
        <i class="fab fa-facebook-f" style="color:#1877F2"></i> Facebook
      </button>
    </div>

    <div class="auth-footer-link">
      Don't have an account? <a href="./signup.html">Sign up</a>
    </div>

    <p style="text-align:center;font-size:.72rem;color:var(--text-light);margin-top:12px">
      By signing in you agree to our
      <a href="#" style="color:var(--blue)">Terms</a> &amp;
      <a href="#" style="color:var(--blue)">Privacy Policy</a>
    </p>
  </div>
</div>

<script type="module">
  import { supabaseClient } from './supabase.js';
  import { handleError, isValidEmail, isValidPassword } from './utils.js';

  // ── Password toggle ──
  document.getElementById('togglePwd').addEventListener('click', () => {
    const inp  = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      inp.type = 'password';
      icon.className = 'fas fa-eye';
    }
  });

  // ── Login form ──
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const msgDiv   = document.getElementById('authMessage');
    const btn      = document.getElementById('submitBtn');

    if (!isValidEmail(email))    { showMsg(msgDiv, 'Enter a valid email address.', 'error'); return; }
    if (!isValidPassword(password)) { showMsg(msgDiv, 'Password must be at least 8 characters.', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';
    showMsg(msgDiv, 'Signing you in…', 'info');

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Log In';
      const msg = error.message.includes('Invalid login') ? 'Incorrect email or password.' : handleError(error);
      showMsg(msgDiv, msg, 'error');
      return;
    }

    // Success
    showMsg(msgDiv, 'Login successful! Redirecting…', 'success');

    // Update last_seen_at
    await supabaseClient.from('profiles').update({ last_seen_at: new Date().toISOString() }).eq('id', data.user.id);

    setTimeout(() => { window.location.href = '../index.html'; }, 1200);
  });

  // ── Social providers ──
  window.signInWithProvider = async (provider) => {
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider,
      options: { redirectTo: window.location.origin + '/index.html' }
    });
    if (error) showMsg(document.getElementById('authMessage'), handleError(error), 'error');
  };

  // ── Helper ──
  function showMsg(el, msg, type) {
    el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    if (type === 'success') setTimeout(() => { el.innerHTML = ''; }, 3000);
  }
</script>
</body>
</html>
