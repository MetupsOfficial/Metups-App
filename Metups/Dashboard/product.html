<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Product — Metups</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../Authentication/styles.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4DD9C0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Metups">
  <link rel="apple-touch-icon" href="/icons/Metups_logo-192.png">
</head>
<body>
<div class="app-shell">

  <!-- Minimal back header -->
  <div class="chat-header" style="background:var(--white);border-bottom:1px solid var(--border)">
    <button class="back-btn" onclick="history.back()" style="color:var(--blue)">
      <i class="fas fa-arrow-left"></i>
    </button>
    <div class="chat-header-info">
      <div class="chat-header-name" id="pageTitle">Product Details</div>
    </div>
    <!-- Share -->
    <button class="nav-icon-btn" id="shareBtn" title="Share">
      <i class="fas fa-share-alt" style="color:var(--blue)"></i>
    </button>
    <!-- Save / heart -->
    <button class="nav-icon-btn card-heart" id="saveBtn" title="Save">
      <i class="far fa-heart" style="font-size:1.1rem;color:var(--text-muted)"></i>
    </button>
  </div>

  <!-- Loading state -->
  <div id="loadingState" style="padding:60px 20px;text-align:center;color:var(--text-muted);margin-top:var(--nav-height)">
    <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--teal)"></i>
    <p style="margin-top:12px">Loading…</p>
  </div>

  <!-- Main content (hidden until loaded) -->
  <div id="productContent" style="display:none;padding-top:var(--nav-height);padding-bottom:90px">

    <!-- Hero image with gallery -->
    <div class="product-detail-img" id="heroWrap">
      <img id="heroImg" src="" alt="Product" onerror="this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'200\' height=\'200\'><rect fill=\'%234DD9C0\' width=\'200\' height=\'200\'/></svg>'">
      <div class="img-count-badge" id="imgCountBadge" style="display:none"></div>
    </div>

    <!-- Thumbnail strip (only shown when > 1 image) -->
    <div class="img-thumbnails" id="thumbStrip" style="display:none"></div>

    <!-- Product body -->
    <div class="product-detail-body">

      <!-- Price + condition -->
      <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">
        <div class="detail-price" id="detailPrice"></div>
        <span class="condition-badge" id="conditionBadge"></span>
        <div id="soldBadge" style="display:none">
          <span class="badge-sold" style="font-size:.8rem;padding:4px 12px">SOLD</span>
        </div>
      </div>

      <div class="detail-title" id="detailTitle"></div>

      <!-- Meta tags -->
      <div style="display:flex;flex-wrap:wrap;margin-top:6px">
        <span class="detail-tag" id="detailLocation"><i class="fas fa-map-marker-alt"></i></span>
        <span class="detail-tag" id="detailCategory"><i class="fas fa-tag"></i></span>
        <span class="detail-tag" id="detailShipping"><i class="fas fa-truck"></i></span>
      </div>

      <!-- Seller card -->
      <div class="seller-row" id="sellerRow">
        <div class="seller-avatar" id="sellerAvatar"></div>
        <div class="seller-info">
          <div class="seller-name" id="sellerName"></div>
          <div class="seller-rating" id="sellerRating"></div>
        </div>
        <span style="margin-left:auto;font-size:.75rem;color:var(--text-muted)" id="sellerJoined"></span>
      </div>

      <!-- Description -->
      <div class="detail-description" id="detailDesc"></div>

      <!-- Owner-only actions -->
      <div id="ownerActions" style="display:none;margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="editListing()">
          <i class="fas fa-edit"></i> Edit Listing
        </button>
        <button class="btn btn-danger btn-sm" id="markSoldBtn" onclick="markAsSold()">
          <i class="fas fa-check"></i> Mark as Sold
        </button>
        <button class="btn btn-danger btn-sm" onclick="deleteListing()">
          <i class="fas fa-trash"></i> Delete
        </button>
      </div>

    </div>
  </div>

  <!-- Error state -->
  <div id="errorState" style="display:none;margin-top:var(--nav-height)" class="empty-state">
    <i class="fas fa-exclamation-circle"></i>
    <h3>Product Not Found</h3>
    <p>This listing may have been removed.</p>
    <a href="../index.html" class="btn btn-primary" style="margin-top:16px">Browse Listings</a>
  </div>

  <!-- Sticky CTA bar (for non-owners) -->
  <div class="detail-cta-bar" id="ctaBar" style="display:none">
    <button class="btn btn-blue btn-block" id="msgSellerBtn">
      <i class="fas fa-comment-dots"></i> Message Seller
    </button>
  </div>

  <!-- Guest modal -->
  <div class="modal-overlay" id="guestModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-logo">
        <div class="logo-center">
            <div class="logo-icon" style="width: 60px; height: 60px;"></div> <!-- CSS sets the image -->
        </div>
        <h2>Sign up to message</h2>
        <p>Create a free account to contact sellers</p>
      </div>
      <a href="../Authentication/signup.html" class="btn btn-blue btn-block" style="margin-bottom:10px">
        <i class="fas fa-user-plus"></i> Sign Up Free
      </a>
      <a href="../Authentication/login.html" class="btn btn-outline btn-block">Already have an account? Log in</a>
      <button class="btn btn-sm" style="width:100%;margin-top:8px;color:var(--text-muted)" onclick="document.getElementById('guestModal').classList.remove('open')">Cancel</button>
    </div>
  </div>

</div>

<style>
  /* ── Owner-only action buttons ── */
  #ownerActions {
    display: none;           /* hidden by default */
    margin-top: 16px;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-start;
  }

  #ownerActions button {
    cursor: pointer;
  }

  /* Optional: disabled / hidden state for sold items */
  #markSoldBtn.hidden {
    display: none;
  }

  /* Guest modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal-sheet {
    background: var(--white);
    border-radius: 16px;
    width: 90%;
    max-width: 360px;
    padding: 24px;
    text-align: center;
  }
</style>


<script type="module">
  import { supabaseClient } from '../Authentication/supabase.js';
  import { checkAuth, formatCurrency, getAvatarInitials, getCategoryIcon, getConditionClass, formatDate } from '../Authentication/utils.js';
  import { createConversation } from '../Messaging/messaging.js';

  // ── Storage bucket name ──────────────────────────────────────
  // Change this one constant if you ever rename the bucket.
  const IMAGES_BUCKET = 'product_images';

  // ── State ──
  let currentUser = null;
  let product     = null;
  let imageUrls   = [];
  let isSaved     = false;

  // ── Boot ──
  document.addEventListener('DOMContentLoaded', async () => {
    currentUser = await checkAuth();

    const productId = new URLSearchParams(window.location.search).get('id');
    if (!productId) { showError(); return; }

    await loadProduct(productId);
  });

  // ── Load product ──
  async function loadProduct(id) {
    const { data, error } = await supabaseClient
      .from('products')
      .select(`
        *,
        seller:profiles!seller_id(id, full_name, avatar_url, rating_avg, rating_count, created_at)
      `)
      .eq('id', id)
      .single();

    if (error || !data) { showError(); return; }
    product = data;

    // Increment view count (fire-and-forget)
    supabaseClient.from('products').update({ views_count: (data.views_count || 0) + 1 }).eq('id', id);

    // Load images
    const { data: imgs } = await supabaseClient
      .from('product_images')
      .select('image_url, image_order')
      .eq('product_id', id)
      .order('image_order');

    // image_url stores the storage path. Reconstruct the full public URL here
    // so that renaming the bucket only requires changing IMAGES_BUCKET above.
    imageUrls = imgs
      ? imgs.map(r => supabaseClient.storage.from(IMAGES_BUCKET).getPublicUrl(r.image_url).data.publicUrl)
      : [];

    // Check if saved
    if (currentUser) {
      const { data: saved } = await supabaseClient
        .from('wishlists')
        .select('id')
        .eq('user_id', currentUser.id)
        .eq('product_id', id)
        .maybeSingle();
      isSaved = !!saved;
    }

    renderProduct();
  }

  // ── Render ──
  function renderProduct() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('productContent').style.display = 'block';

    const p = product;

    // Page title
    document.title = `${p.title} — Metups`;
    document.getElementById('pageTitle').textContent = p.title;

    // Hero image
    if (imageUrls.length > 0) {
      document.getElementById('heroImg').src = imageUrls[0];
      if (imageUrls.length > 1) {
        document.getElementById('imgCountBadge').textContent = `1 / ${imageUrls.length}`;
        document.getElementById('imgCountBadge').style.display = 'block';
        renderThumbs();
      }
    } else {
      // Category icon placeholder
      document.getElementById('heroWrap').innerHTML =
        `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--teal-light)">
          <i class="fas fa-${getCategoryIcon(p.category)}" style="font-size:5rem;color:var(--orange);opacity:.6"></i>
        </div>`;
    }

    // Price & condition
    document.getElementById('detailPrice').textContent = formatCurrency(p.price);
    const condBadge = document.getElementById('conditionBadge');
    condBadge.textContent = p.condition || '';
    condBadge.className = `condition-badge ${getConditionClass(p.condition)}`;

    if (p.sold) {
      document.getElementById('soldBadge').style.display = 'block';
    }

    // Title & meta
    document.getElementById('detailTitle').textContent = p.title;
    document.getElementById('detailLocation').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${p.location || 'Unknown'}`;
    document.getElementById('detailCategory').innerHTML = `<i class="fas fa-tag"></i> ${p.category || ''}`;
    document.getElementById('detailShipping').innerHTML = `<i class="fas fa-truck"></i> ${p.shipping_available ? 'Shipping available' : 'Local pickup only'}`;

    // Seller
    const seller = p.seller || {};
    const initials = getAvatarInitials(seller.full_name || 'UN');
    const avatarEl = document.getElementById('sellerAvatar');
    if (seller.avatar_url) {
      avatarEl.innerHTML = `<img src="${seller.avatar_url}" style="width:100%;height:100%;object-fit:cover">`;
    } else {
      avatarEl.textContent = initials;
    }
    document.getElementById('sellerName').textContent = seller.full_name || 'Unknown Seller';
    const ratingText = seller.rating_avg
      ? `⭐ ${parseFloat(seller.rating_avg).toFixed(1)} (${seller.rating_count} reviews)`
      : 'No reviews yet';
    document.getElementById('sellerRating').textContent = ratingText;
    if (seller.created_at) {
      document.getElementById('sellerJoined').textContent = `Since ${formatDate(seller.created_at).split(' ')[2] || ''}`;
    }

    // Description
    document.getElementById('detailDesc').textContent = p.description || '';

    // Auth-aware UI
    const isOwner = currentUser && currentUser.id === p.seller_id;

    if (isOwner) {
      // Show owner controls
      const ownerEl = document.getElementById('ownerActions');
      ownerEl.style.display = 'flex';
      if (p.sold) document.getElementById('markSoldBtn').style.display = 'none';
    } else if (!p.sold) {
      // Show message seller bar for buyers
      document.getElementById('ctaBar').style.display = 'block';
    }

    // Save button state
    const saveBtn = document.getElementById('saveBtn');
    if (isSaved) {
      saveBtn.innerHTML = '<i class="fas fa-heart" style="font-size:1.1rem;color:var(--red)"></i>';
    }

    // Wire up buttons
    document.getElementById('msgSellerBtn').addEventListener('click', contactSeller);
    document.getElementById('saveBtn').addEventListener('click', toggleSave);
    document.getElementById('shareBtn').addEventListener('click', shareProduct);

    authAwareUI();
  }

  // ── Thumbnail gallery ──
  function renderThumbs() {
    const strip = document.getElementById('thumbStrip');
    strip.style.display = 'flex';
    strip.innerHTML = imageUrls.map((url, i) => `
      <img src="${url}" class="img-thumb ${i === 0 ? 'active' : ''}" alt="Image ${i+1}"
           onclick="setHero(${i})" loading="lazy">
    `).join('');
  }

  window.setHero = (idx) => {
    document.getElementById('heroImg').src = imageUrls[idx];
    document.getElementById('imgCountBadge').textContent = `${idx+1} / ${imageUrls.length}`;
    document.querySelectorAll('.img-thumb').forEach((t,i) => t.classList.toggle('active', i === idx));
  };

  // ── Contact seller ──
  async function contactSeller() {
    if (!currentUser) {
      document.getElementById('guestModal').classList.add('open');
      return;
    }
    const btn = document.getElementById('msgSellerBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Opening chat…';

    try {
      const convId = await createConversation(product.id, product.seller_id);
      window.location.href = `../Messaging/messaging.html?conversation=${convId}`;
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-comment-dots"></i> Message Seller';
      alert('Could not open conversation: ' + err.message);
    }
  }

  // ── Save / unsave ──
  async function toggleSave() {
    if (!currentUser) { document.getElementById('guestModal').classList.add('open'); return; }
    const btn = document.getElementById('saveBtn');

    if (isSaved) {
      await supabaseClient.from('wishlists').delete().eq('user_id', currentUser.id).eq('product_id', product.id);
      isSaved = false;
      btn.innerHTML = '<i class="far fa-heart" style="font-size:1.1rem;color:var(--text-muted)"></i>';
    } else {
      await supabaseClient.from('wishlists').insert({ user_id: currentUser.id, product_id: product.id, active: true });
      isSaved = true;
      btn.innerHTML = '<i class="fas fa-heart" style="font-size:1.1rem;color:var(--red)"></i>';
    }
  }

  // ── Share ──
  function shareProduct() {
    if (navigator.share) {
      navigator.share({ title: product.title, url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href);
      alert('Link copied to clipboard!');
    }
  }

  // ── Owner actions ──
  window.editListing = () => {
    window.location.href = `./add_product.html?edit=${product.id}`;
  };

  window.markAsSold = async () => {
    if (!confirm('Mark this item as SOLD?')) return;
    const { error } = await supabaseClient
      .from('products')
      .update({ sold: true, sold_at: new Date().toISOString() })
      .eq('id', product.id);
    if (error) { alert('Error: ' + error.message); return; }
    // Show sold confirmation modal
    showSaleConfirmed();
  };

  window.deleteListing = async () => {
    if (!confirm('Delete this listing permanently?')) return;
    const { error } = await supabaseClient.from('products').update({ is_active: false }).eq('id', product.id);
    if (error) { alert('Error: ' + error.message); return; }
    alert('Listing deleted.');
    window.location.href = '../Dashboard/dashboard.html';
  };

  function showSaleConfirmed() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay open';
    overlay.innerHTML = `
      <div class="modal-sheet" style="text-align:center;padding:32px 24px">
        <div class="modal-handle"></div>
        <div class="sale-confirmed-icon"><i class="fas fa-check"></i></div>
        <div class="sale-confirmed-title">Item Marked as Sold!</div>
        <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:20px">
          Congratulations on your sale! Your listing is now marked as SOLD.
        </p>
        <a href="../Dashboard/dashboard.html" class="btn btn-primary btn-block">View My Listings</a>
      </div>
    `;
    document.body.appendChild(overlay);
  }

  // ── Error ──
  function showError() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
  }



  // ── Show/hide owner buttons based on login and ownership ──
  function updateOwnerActions() {
    const ownerEl = document.getElementById('ownerActions');
    const ctaBar   = document.getElementById('ctaBar');

    const isOwner = currentUser && currentUser.id === product.seller_id;

    if (isOwner) {
      // Owner: show owner buttons
      ownerEl.style.display = 'flex';
      // Hide "Mark as Sold" if already sold
      document.getElementById('markSoldBtn').style.display = product.sold ? 'none' : 'inline-flex';
      ctaBar.style.display = 'none';
    } else {
      // Non-owner: hide owner buttons
      ownerEl.style.display = 'none';
      if (!product.sold) {
        // Show message seller bar for buyers
        ctaBar.style.display = 'block';
      }
    }
  }

  // ── Wrap owner actions to prevent guests from clicking ──
  document.addEventListener('DOMContentLoaded', () => {
    const ownerEl = document.getElementById('ownerActions');
    ownerEl.addEventListener('click', (e) => {
      if (!currentUser) {
        e.preventDefault();
        document.getElementById('guestModal').classList.add('open');
      }
    });

    const ctaBtn = document.getElementById('msgSellerBtn');
    ctaBtn.addEventListener('click', () => {
      if (!currentUser) {
        document.getElementById('guestModal').classList.add('open');
      }
    });
  });

  // ── Call this function after product is loaded ──
  function authAwareUI() {
    updateOwnerActions();
  }

  // Example: Call inside renderProduct at the end
  // authAwareUI();
</script>

<!-- Desktop sidebar -->
<script type="module" src="../Authentication/navigation.js"></script>

<!-- PWA Service Worker -->
<script>
  if ('serviceWorker' in navigator)
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(()=>{}));
</script>

</body>
</html>
